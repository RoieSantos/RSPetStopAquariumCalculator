<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RSPETSTOP Custom Aquarium Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f7fb;
      color: #222;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      background: #fff;
      padding: 20px 24px 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-radius: 8px;
    }
    h1 {
      margin-top: 0;
      color: #0b3c7d;
      font-size: 22px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px 24px;
      margin-top: 16px;
    }
    .card {
      border: 1px solid #dde2ee;
      border-radius: 6px;
      padding: 12px 14px 14px;
      background: #fafbff;
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 15px;
      color: #0b3c7d;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      font-weight: 600;
    }
    input[type="number"],
    select,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      font-size: 13px;
      border-radius: 4px;
      border: 1px solid #c7cfe4;
    }
    textarea {
      resize: vertical;
      min-height: 60px;
    }
    .row {
      margin-bottom: 8px;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .checkbox-row input {
      margin: 0;
    }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    button {
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    #btnCalculate {
      background: #0b3c7d;
      color: #fff;
    }
    #btnAddToSale {
      background: #198754;
      color: #fff;
    }
    #btnClose {
      background: #6c757d;
      color: #fff;
    }
    .result {
      margin-top: 10px;
      font-size: 13px;
    }
    .result span.label {
      font-weight: 600;
    }
    .note {
      font-size: 11px;
      color: #777;
      margin-top: 4px;
    }
  </style>
</head>

<body>
  <div class="page">
    <h1>RSPETSTOP Custom Aquarium Calculator WEB version</h1>

    <div class="grid">
      <!-- Dimensions & Units -->
      <div class="card">
        <h2>Main dimensions</h2>
        <div class="row">
          <label for="txtLength">Length</label>
          <input id="txtLength" type="number" min="0" step="0.1" />
        </div>
        <div class="row">
          <label for="txtWidth">Width</label>
          <input id="txtWidth" type="number" min="0" step="0.1" />
        </div>
        <div class="row">
          <label for="txtHeight">Height</label>
          <input id="txtHeight" type="number" min="0" step="0.1" />
        </div>
        <div class="row">
          <label for="cboUnit">Unit of Measure</label>
          <select id="cboUnit">
            <option>Inches</option>
            <option>CM</option>
            <option>Ft</option>
            <option>MM</option>
          </select>
        </div>
        <div class="row">
          <label for="cboOption">Option</label>
          <select id="cboOption">
            <option>Aquarium only</option>
            <option>Undersump</option>
            <option>Overheadsump</option>
            <option>Complete setup</option>
          </select>
        </div>
        <div class="row">
          <label for="cboGlass">Glass Thickness</label>
          <select id="cboGlass">
            <option>3mm</option>
            <option selected>6mm</option>
            <option>10mm</option>
            <option>12mm</option>
          </select>
        </div>
        <div class="row">
          <label for="cboSealant">Sealant</label>
          <select id="cboSealant">
            <option value="">-- select --</option>
            <option>Clear</option>
            <option>Black</option>
          </select>
        </div>
      </div>

      <!-- Options -->
      <div class="card">
        <h2>Options</h2>
        <div class="checkbox-row">
          <input id="chkAio" type="checkbox" />
          <label for="chkAio">AIO</label>
        </div>
        <div class="checkbox-row">
          <input id="chkLowIron" type="checkbox" />
          <label for="chkLowIron">Low Iron</label>
        </div>
        <div class="checkbox-row">
          <input id="chkTempered" type="checkbox" />
          <label for="chkTempered">Tempered Glass</label>
        </div>
        <div class="checkbox-row">
          <input id="chkRimless" type="checkbox" />
          <label for="chkRimless">Rimless</label>
        </div>
        <div class="checkbox-row">
          <input id="chkHighStrip" type="checkbox" />
          <label for="chkHighStrip">High Strip</label>
        </div>
        <div class="checkbox-row">
          <input id="chkCompleteSet" type="checkbox" />
          <label for="chkCompleteSet">Filtration sump</label>
        </div>
        <div class="checkbox-row">
          <input id="chkAquascape" type="checkbox" />
          <label for="chkAquascape">Aquascape service</label>
        </div>
        <div class="checkbox-row">
          <input id="chkEnclosure" type="checkbox" />
          <label for="chkEnclosure">Enclosure</label>
        </div>
        <div class="checkbox-row">
          <input id="chkStand" type="checkbox" />
          <label for="chkStand">Stand</label>
        </div>
      </div>

      <!-- Sump & extras -->
      <div class="card">
        <h2>Sump & extras</h2>
        <div class="row">
          <label for="cboSumpType">Sump Type</label>
          <select id="cboSumpType">
            <option>Undersump</option>
            <option>Overhead Sump</option>
          </select>
        </div>
        <div class="row">
          <label>Sump Dimensions</label>
          <div style="display:flex; gap:4px;">
            <input id="txtSumpL" type="number" placeholder="L" min="0" step="0.1" />
            <input id="txtSumpW" type="number" placeholder="W" min="0" step="0.1" />
            <input id="txtSumpH" type="number" placeholder="H" min="0" step="0.1" />
          </div>
        </div>
        <div class="row">
          <label for="cboSumpUnit">Sump UOM</label>
          <select id="cboSumpUnit">
            <option>Inches</option>
            <option>CM</option>
            <option>Ft</option>
            <option>MM</option>
          </select>
        </div>
        <div class="checkbox-row">
          <input id="chkPiping" type="checkbox" />
          <label for="chkPiping">Set of Piping</label>
        </div>
        <div class="checkbox-row">
          <input id="chkOverflow" type="checkbox" />
          <label for="chkOverflow">Overflow Box</label>
        </div>
        <div class="checkbox-row">
          <input id="chkFilterMedias" type="checkbox" />
          <label for="chkFilterMedias">Filter medias</label>
        </div>
        <div class="checkbox-row">
          <input id="chkSubLight" type="checkbox" />
          <label for="chkSubLight">Submersible Light</label>
        </div>
        <div class="checkbox-row">
          <input id="chkSubPump" type="checkbox" />
          <label for="chkSubPump">Submersible Pump</label>
        </div>
        <div class="checkbox-row">
          <input id="chkAllumTopCover" type="checkbox" />
          <label for="chkAllumTopCover">Allum Top Cover</label>
        </div>
      </div>

      <!-- Stickers & notes -->
      <div class="card">
        <h2>Stickers & notes</h2>
        <div class="checkbox-row">
          <input id="chkStickerBg" type="checkbox" />
          <label for="chkStickerBg">Sticker Background</label>
        </div>
        <div class="checkbox-row">
          <input id="chkStickerBgAllSides" type="checkbox" />
          <label for="chkStickerBgAllSides">All Sides</label>
        </div>
        <div class="row">
          <label for="cboStickerBgType">Sticker Background Type</label>
          <select id="cboStickerBgType">
            <option>Plain Sticker</option>
            <option>Sticker Tiles</option>
          </select>
        </div>
        <div class="checkbox-row">
          <input id="chkStickerBottom" type="checkbox" />
          <label for="chkStickerBottom">Sticker Bottom</label>
        </div>
        <div class="row">
          <label for="cboStickerBottomType">Sticker Bottom Type</label>
          <select id="cboStickerBottomType">
            <option>Plain Sticker</option>
            <option>Sticker Tiles</option>
          </select>
        </div>
        <div class="row">
          <label for="txtSpecialNote">Special note</label>
          <textarea id="txtSpecialNote"></textarea>
        </div>
      </div>
    </div>

    <div class="actions">
      <button id="btnCalculate">Calculate</button>
      <button id="btnAddToSale" disabled>Add to sale</button>
      <button id="btnClose" type="button">Close</button>
      <div class="result">
        <div><span class="label">Volume:</span> <span id="lblVolume">0 gallons</span></div>
        <div><span class="label">Price:</span> <span id="lblPrice">0.00</span></div>
        <div class="note" id="lblInches"></div>
      </div>
    </div>

    <!-- Aquarium Drawing -->
    <div class="card" style="margin-top:20px;">
      <h2>Aquarium Drawing</h2>
      <svg id="aquariumDrawing" width="100%" height="300" style="border:1px solid #ccc; background:#fdfdfd;"></svg>
      <div class="note">Drawing is scaled automatically based on your dimensions.</div>
    </div>

  </div> <!-- end .page -->
  <script>
    // --- Helpers: unit conversion to inches ---
    function toInches(value, unit) {
      const v = Number(value) || 0;
      switch (unit) {
        case "CM": return v / 2.54;
        case "Ft": return v * 12;
        case "MM": return v / 25.4;
        default:   return v;
      }
    }

    function roundToNearest10IfNeeded(amount) {
      if (amount >= 1000) {
        return Math.round(amount / 10) * 10;
      }
      return amount;
    }

    // Base fallback glass pricing (you can later replace with DB-driven)
    function getBaseGlassPricePerSqFt(thickness) {
      switch (thickness) {
        case "3mm": return 85;
        case "6mm": return 185;
        case "10mm": return 290;
        case "12mm": return 330;
        default: return 100;
      }
    }

    // --- SAFETY RULES (ported from WinForms logic) ---
    function safetyRules(L, W, H, glass, tempered, rimless) {
      const g = glass.replace("mm", "");
      const thickness = parseInt(g, 10);
      const gallons = (L * W * H) / 231.0;

      // Tempered mandatory at >= 36"
      if (W >= 36 || H >= 36) {
        return {
          safe: tempered,
          autoChange: tempered ? null : glass,
          message: "Tempered glass is mandatory when width or height reaches 36 inches or more."
        };
      }

      // Rimless requires >= 10mm
      if (rimless && thickness < 10) {
        return {
          safe: false,
          autoChange: "10mm",
          message: "Rimless aquariums require at least 10mm glass."
        };
      }

      // AIO cannot use 3mm
      if (document.getElementById("chkAio").checked && thickness === 3) {
        return {
          safe: false,
          autoChange: "6mm",
          message: "AIO setup is not allowed with 3mm glass. Auto‑upgraded to 6mm."
        };
      }

      // Low Iron + Tempered must be >= 10mm
      if (document.getElementById("chkLowIron").checked &&
          document.getElementById("chkTempered").checked &&
          thickness < 10) {
        return {
          safe: false,
          autoChange: "10mm",
          message: "Low Iron Tempered glass must be at least 10mm."
        };
      }

      // Structural limits
      if (thickness === 3 && (H > 12 || gallons > 10)) {
        return { safe: false, autoChange: "6mm", message: "3mm is unsafe for this size. Auto‑upgraded to 6mm." };
      }
      if (thickness === 6 && (H > 20 || gallons > 90)) {
        return { safe: false, autoChange: "10mm", message: "6mm is unsafe for this size. Auto‑upgraded to 10mm." };
      }
      if (thickness === 10 && (H > 28 || gallons > 170)) {
        return { safe: false, autoChange: "12mm", message: "10mm is unsafe for this size. Auto‑upgraded to 12mm." };
      }
      if (thickness === 12 && (H > 36 || gallons > 300)) {
        return { safe: false, autoChange: null, message: "12mm is at its structural limit. Consider thicker glass." };
      }

      return { safe: true, autoChange: null, message: "" };
    }

    // --- AQUARIUM DRAWING (Front + Top views) ---
   function drawAquarium(L, W, H) {
  const svg = document.getElementById("aquariumDrawing");
  svg.innerHTML = "";

  if (!(L > 0 && W > 0 && H > 0)) return;

  // Rimless toggle
  const rimless = document.getElementById("chkRimless").checked;

  // Glass thickness (mm → inches)
  const glass = document.getElementById("cboGlass").value;
  const thicknessMM = parseInt(glass.replace("mm", ""));
  const thicknessIn = thicknessMM / 25.4;

  // Scale
  const maxDim = Math.max(L, W, H);
  const scale = 120 / maxDim;

  const l = L * scale;
  const w = W * scale;
  const h = H * scale;
  const t = thicknessIn * scale;

  // Isometric offsets
  const isoX = w * 0.7;
  const isoY = w * 0.4;

  // Base position
  const x = 80;
  const y = 220;

  // OUTER FACES
  const frontOuter = `
    M ${x} ${y}
    L ${x + l} ${y}
    L ${x + l} ${y - h}
    L ${x} ${y - h}
    Z
  `;

  const topOuter = `
    M ${x} ${y - h}
    L ${x + isoX} ${y - h - isoY}
    L ${x + isoX + l} ${y - h - isoY}
    L ${x + l} ${y - h}
    Z
  `;

  const sideOuter = `
    M ${x + l} ${y}
    L ${x + l + isoX} ${y - isoY}
    L ${x + l + isoX} ${y - isoY - h}
    L ${x + l} ${y - h}
    Z
  `;

  // INNER FACES (glass thickness)
  const frontInner = `
    M ${x + t} ${y - t}
    L ${x + l - t} ${y - t}
    L ${x + l - t} ${y - h + t}
    L ${x + t} ${y - h + t}
    Z
  `;

  const topInner = `
    M ${x + t} ${y - h + t}
    L ${x + isoX - t} ${y - h - isoY + t}
    L ${x + isoX + l - t} ${y - h - isoY + t}
    L ${x + l - t} ${y - h + t}
    Z
  `;

  const sideInner = `
    M ${x + l - t} ${y - t}
    L ${x + l + isoX - t} ${y - isoY - t}
    L ${x + l + isoX - t} ${y - isoY - h + t}
    L ${x + l - t} ${y - h + t}
    Z
  `;

  // BRACED TOP FRAME (only if NOT rimless)
  let topFrame = "";
  if (!rimless) {
    topFrame = `
      <path d="${topOuter}" fill="rgba(80,80,80,0.25)" stroke="rgba(40,40,40,0.9)" stroke-width="2"/>
      <path d="${topInner}" fill="rgba(255,255,255,0.05)" stroke="rgba(60,60,60,0.7)" stroke-width="1"/>
    `;
  }

  // Gradients
  const gradients = `
    <defs>
      <linearGradient id="glassFront" x1="0%" y1="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(180,220,255,0.35)" />
        <stop offset="100%" stop-color="rgba(120,170,220,0.15)" />
      </linearGradient>

      <linearGradient id="glassTop" x1="0%" y1="0%" x2="100%">
        <stop offset="0%" stop-color="rgba(200,240,255,0.45)" />
        <stop offset="100%" stop-color="rgba(150,200,230,0.20)" />
      </linearGradient>

      <linearGradient id="glassSide" x1="0%" y1="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(180,220,255,0.30)" />
        <stop offset="100%" stop-color="rgba(120,160,200,0.10)" />
      </linearGradient>
    </defs>
  `;

  svg.innerHTML = `
    ${gradients}

    <!-- OUTER GLASS -->
    <path d="${frontOuter}" fill="url(#glassFront)" stroke="rgba(0,60,120,0.9)" stroke-width="2"/>
    <path d="${sideOuter}" fill="url(#glassSide)" stroke="rgba(50,50,50,0.9)" stroke-width="2"/>

    <!-- TOP (only if rimless) -->
    ${rimless ? `<path d="${topOuter}" fill="url(#glassTop)" stroke="rgba(0,120,80,0.9)" stroke-width="2"/>` : ""}

    <!-- BRACED TOP (if not rimless) -->
    ${topFrame}

    <!-- INNER GLASS -->
    <path d="${frontInner}" fill="none" stroke="rgba(0,60,120,0.5)" stroke-width="1"/>
    <path d="${sideInner}" fill="none" stroke="rgba(50,50,50,0.5)" stroke-width="1"/>
    <path d="${topInner}" fill="none" stroke="rgba(0,120,80,0.5)" stroke-width="1"/>

    <!-- Labels -->
    <text x="${x + l/2}" y="${y + 20}" font-size="12" text-anchor="middle" fill="#333">
      Length: ${L.toFixed(1)}"
    </text>

    <text x="${x - 10}" y="${y - h/2}" font-size="12" text-anchor="end" fill="#333">
      Height: ${H.toFixed(1)}"
    </text>

    <text x="${x + l + isoX/2 + 10}" y="${y - isoY/2}" font-size="12" fill="#333">
      Width: ${W.toFixed(1)}"
    </text>
  `;
}

    // --- MAIN CALCULATION ---
    function calculate() {
      const length = Number(document.getElementById("txtLength").value);
      const width  = Number(document.getElementById("txtWidth").value);
      const height = Number(document.getElementById("txtHeight").value);
      const unit   = document.getElementById("cboUnit").value;
      const glass  = document.getElementById("cboGlass").value;

      const chkAio        = document.getElementById("chkAio").checked;
      const chkLowIron    = document.getElementById("chkLowIron").checked;
      const chkTempered   = document.getElementById("chkTempered").checked;
      const chkRimless    = document.getElementById("chkRimless").checked;
      const chkHighStrip  = document.getElementById("chkHighStrip").checked;
      const chkComplete   = document.getElementById("chkCompleteSet").checked;
      const chkAquascape  = document.getElementById("chkAquascape").checked;
      const chkEnclosure  = document.getElementById("chkEnclosure").checked;
      const chkStand      = document.getElementById("chkStand").checked;

      const lblVolume = document.getElementById("lblVolume");
      const lblPrice  = document.getElementById("lblPrice");
      const lblInches = document.getElementById("lblInches");
      const btnAdd    = document.getElementById("btnAddToSale");

      if (!(length > 0 && width > 0 && height > 0)) {
        lblVolume.textContent = "0 gallons";
        lblPrice.textContent  = "0.00";
        lblInches.textContent = "";
        drawAquarium(0, 0, 0);
        btnAdd.disabled = true;
        return;
      }

      // Convert to inches
      const L = toInches(length, unit);
      const W = toInches(width, unit);
      const H = toInches(height, unit);

      // Volume in gallons
      const gallons = (L * W * H) / 231.0;
      lblVolume.textContent = gallons.toFixed(1) + " gallons";
      lblInches.textContent = `Dimensions (in): L: ${L.toFixed(1)}" x W: ${W.toFixed(1)}" x H: ${H.toFixed(1)}"`;

      // Draw aquarium
      drawAquarium(L, W, H);

      // SAFETY CHECK
      const safety = safetyRules(L, W, H, glass, chkTempered, chkRimless);
      if (!safety.safe) {
        if (safety.autoChange) {
          document.getElementById("cboGlass").value = safety.autoChange;
          alert(safety.message + "\nGlass upgraded to " + safety.autoChange + ".");
          calculate(); // re-run with new thickness
          return;
        } else {
          alert(safety.message);
          lblPrice.textContent = "0.00";
          btnAdd.disabled = true;
          return;
        }
      }

      // --- BASIC PRICE CALCULATION (simplified) ---
      // Surface area (5 panels, no top)
      const frontBack = 2 * (L * H);
      const sides     = 2 * (W * H);
      const bottom    = L * W;
      const surfaceAreaSqIn = frontBack + sides + bottom;
      const surfaceAreaSqFt = surfaceAreaSqIn / 144.0;

      let pricePerSqFt = getBaseGlassPricePerSqFt(glass);
      if (chkTempered) {
        pricePerSqFt *= 2; // tempered multiplier
      }

      let calculatedPrice = surfaceAreaSqFt * pricePerSqFt;

      // High strip (simple add-on)
      if (chkHighStrip) {
        calculatedPrice += 500; // placeholder
      }

      // Option-based markup: 90% increase for undersump/overheadsump
      const opt = document.getElementById("cboOption").value || "Aquarium only";
      if (opt.toLowerCase() === "undersump" ||
          opt.toLowerCase() === "overheadsump" ||
          opt.toLowerCase() === "overheadsum") {
        calculatedPrice = Math.round(calculatedPrice * 1.90 * 100) / 100;
      }

      // AIO markup: +140%
      if (chkAio) {
        calculatedPrice = Math.round(calculatedPrice * 2.40 * 100) / 100;
      }

      // Low Iron markup: +70%
      if (chkLowIron) {
        calculatedPrice = Math.round(calculatedPrice * 1.70 * 100) / 100;
      }

      // Aquascape service: ₱210 per gallon
      if (chkAquascape) {
        calculatedPrice += Math.round(gallons * 210);
      }

      // Enclosure markup: x 210%
      if (chkEnclosure) {
        calculatedPrice = Math.round(calculatedPrice * 2.10 * 100) / 100;
      }

      // Round to nearest 10 if >= 1000
      calculatedPrice = roundToNearest10IfNeeded(calculatedPrice);

      lblPrice.textContent = calculatedPrice.toFixed(2);
      btnAdd.disabled = false;
    }

    // --- EVENT WIRING ---
    window.addEventListener("DOMContentLoaded", () => {
      const inputs = [
        "txtLength","txtWidth","txtHeight",
        "cboUnit","cboOption","cboGlass",
        "chkAio","chkLowIron","chkTempered","chkRimless",
        "chkHighStrip","chkCompleteSet","chkAquascape",
        "chkEnclosure","chkStand"
      ];

      inputs.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener("change", calculate);
          el.addEventListener("input", calculate);
        }
      });

      document.getElementById("btnCalculate").addEventListener("click", calculate);

      document.getElementById("btnClose").addEventListener("click", () => {
        // In a real POS app this would close the form; here we can just clear.
        document.getElementById("txtLength").value = "";
        document.getElementById("txtWidth").value = "";
        document.getElementById("txtHeight").value = "";
        document.getElementById("lblVolume").textContent = "0 gallons";
        document.getElementById("lblPrice").textContent = "0.00";
        document.getElementById("lblInches").textContent = "";
        drawAquarium(0,0,0);
      });

      // Initial state
      calculate();
    });
  </script>
</body>
</html>
